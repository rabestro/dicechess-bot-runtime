name: CD

# push: tags fires for a tag pushed with real user credentials (e.g. a human pushing from their
# own machine) — GitHub does not fire this trigger for a tag pushed by another workflow using the
# default GITHUB_TOKEN (documented anti-recursion behavior), which is why release.yml publishes
# inline instead of depending on this. workflow_dispatch is the manual recovery path: pick the
# existing tag as the ref to re-run a publish that release.yml missed before that fix landed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.0.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set version from tag
        run: mvn --batch-mode versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false

      - name: Run tests
        run: mvn --batch-mode test

      - name: Publish
        run: mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
