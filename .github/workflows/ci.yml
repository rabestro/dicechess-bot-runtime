name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.0.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run tests
        run: mvn --batch-mode test

      # A hard gate, not just a docs.yml side effect: doclint=all + failOnWarning=true (pom.xml)
      # means missing or malformed Javadoc on public API fails CI here, before it ever reaches
      # docs.yml's publish step.
      - name: Javadoc quality gate
        run: mvn --batch-mode javadoc:javadoc
